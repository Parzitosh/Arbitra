<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitra | Web3 Escrow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-auth">

    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">Arbi<span>tra</span></div>
            <div class="nav-tagline">Premium Web3 escrow platform</div>
        </div>
        <div class="nav-links">
            <button id="show-login" class="btn-outline">Sign In</button>
            <button id="show-signup" class="btn-primary">Sign Up</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="auth-container" id="login-section">
            <h2>Welcome Back</h2>
            <p>Enter the buyer, seller, and arbiter surfaces from one secure Web3 gateway.</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Username or Email</label>
                    <input type="text" id="login-identifier" required placeholder="Enter username or email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>

        <div class="auth-container hidden" id="signup-section">
            <h2>Create an Account</h2>
            <p>Join the secure Web3 marketplace and attach the wallet you want to operate with.</p>
            <form id="signup-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label>Wallet Address</label>
                    <input type="text" id="signup-wallet" required placeholder="0x...">
                </div>
                <button type="submit" class="btn-submit">Sign Up</button>
            </form>
        </div>
    </main>

    <footer>
        <p style="margin-bottom: 10px; color: var(--text-muted); font-size: 0.9rem;">Designed and built by Paritosh</p>
        <div>
            <a href="https://github.com/Parzitosh" target="_blank">GitHub</a> |
            <a href="https://www.linkedin.com/in/paritosh-jamwal-29315228b/" target="_blank">LinkedIn</a> |
            <a href="mailto:jamwalparitosh@gmail.com">Email</a>
        </div>
    </footer>

    <script src="js/api.js?v=prod1"></script>
    <script src="js/auth.js?v=prod1"></script>
</body>
</html>
